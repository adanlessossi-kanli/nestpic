name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --reporter=junit --outputFile=test-results/junit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/junit.xml

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start test services
        run: docker compose -f docker-compose.test.yml up -d
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 20); do
            PG_HEALTH=$(docker inspect $(docker compose -f docker-compose.test.yml ps -q postgres-test) --format '{{.State.Health.Status}}' 2>/dev/null || echo "starting")
            SW_HEALTH=$(docker inspect $(docker compose -f docker-compose.test.yml ps -q swift-test) --format '{{.State.Health.Status}}' 2>/dev/null || echo "starting")
            echo "Attempt $i: postgres=$PG_HEALTH swift=$SW_HEALTH"
            if [ "$PG_HEALTH" = "healthy" ] && [ "$SW_HEALTH" = "healthy" ]; then
              echo "All services healthy"
              exit 0
            fi
            sleep 3
          done
          echo "ERROR: Test services failed to become healthy within 60 seconds"
          docker compose -f docker-compose.test.yml logs
          exit 1
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/nestpic_test
          OBJECT_STORE_ENDPOINT: http://localhost:8081
          OBJECT_STORE_ACCESS_KEY: localdev
          OBJECT_STORE_SECRET_KEY: localdev-secret
          OBJECT_STORE_BUCKET: nestpic-test
          SESSION_SECRET: test-session-secret-change-in-production-32c
          CDN_BASE_URL: http://localhost:8081
          CDN_KEY_PAIR_ID: local-key-pair-id
          CDN_PRIVATE_KEY: local-private-key-placeholder
          NODE_ENV: test
          DISABLE_LOCAL_WORKER: 'true'
          RATE_LIMIT_DISABLED: 'true'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
      - name: Stop test services
        if: always()
        run: docker compose -f docker-compose.test.yml down

  build:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nestpic
          SESSION_SECRET: stub-session-secret-for-build-only-not-real
          OBJECT_STORE_ENDPOINT: http://localhost:8080
          OBJECT_STORE_ACCESS_KEY: stub
          OBJECT_STORE_SECRET_KEY: stub
          OBJECT_STORE_BUCKET: nestpic
          CDN_BASE_URL: http://localhost:8080
          CDN_KEY_PAIR_ID: stub
          CDN_PRIVATE_KEY: stub
          NODE_ENV: production
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 7

  docker-publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, type-check, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
